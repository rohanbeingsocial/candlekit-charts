<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@getcandlekit/charts — Drawing tools + flex layout</title>
    <style>
      /* Single source of truth for chrome colors; the chart canvas + .ck-* overlays
         follow `data-theme` too (styles.css). Toggling the attribute themes
         everything at once — no refresh. */
      html[data-theme="dark"] {
        --app-bg: #0e1117; --app-fg: #e5e7eb; --app-panel: #161b22;
        --app-border: #2a313c; --app-muted: #97a0ad; color-scheme: dark;
      }
      html[data-theme="light"] {
        --app-bg: #ffffff; --app-fg: #1f2937; --app-panel: #f6f8fa;
        --app-border: #e5e7eb; --app-muted: #6b7280; color-scheme: light;
      }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: var(--app-bg); color: var(--app-fg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
