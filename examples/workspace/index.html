<!doctype html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>candlekit/charts — live demo</title>
    <style>
      :root { color-scheme: dark; }
      /* App chrome palette mirrors the host trading-dashboard tokens exactly. */
      html.dark { --app-bg: hsl(224 24% 6%); --app-fg: hsl(210 30% 96%); --app-panel: hsl(224 22% 9%); --app-border: hsl(224 16% 16%); --app-muted: hsl(215 16% 60%); --app-accent: hsl(188 95% 55%); }
      html:not(.dark) { --app-bg: hsl(0 0% 100%); --app-fg: hsl(224 24% 12%); --app-panel: hsl(220 14% 97%); --app-border: hsl(220 13% 88%); --app-muted: hsl(215 16% 40%); --app-accent: hsl(188 85% 38%); color-scheme: light; }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: var(--app-bg); color: var(--app-fg); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
