name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Plain install: npm resolves rollup's platform-specific native binary
      # correctly, and the git-hosted MPL line-tools are optionalDependencies —
      # if GitHub is unreachable their failure is non-fatal and the core
      # build/typecheck/test still pass without them.
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
