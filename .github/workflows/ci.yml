name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Plain install: npm resolves rollup's platform-specific native binary
      # correctly. lightweight-charts is the only runtime dependency (a peer);
      # drawing tools and indicators are built in, so there are no git-hosted
      # or optional runtimes to resolve.
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
